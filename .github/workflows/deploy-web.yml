name: Deploy web

# On every merge to main: build the offline WASM web app (apps/web) into a Docker
# image (Go -> wasm, Vite build, Caddy static server with SPA routing) and push it to
# GHCR. The Railway service watches this image tag and auto-deploys the new digest —
# no deploy call from CI is needed.
#
# One-time setup:
#   - Point the Railway service at ghcr.io/<owner>/companion-web:latest and enable
#     auto-deploy on the image. If the package is private, give Railway registry
#     credentials (a PAT with read:packages); otherwise make the package public.
on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer merge supersedes an in-flight build.
concurrency:
  group: deploy-web
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push the image to GHCR

jobs:
  image:
    name: build + push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image ref (lowercase owner)
        id: meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ref=ghcr.io/${owner}/companion-web" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          # :latest is the tag Railway watches for auto-deploy; the :<sha> tag is an
          # immutable record of each build for traceability and rollback.
          tags: |
            ${{ steps.meta.outputs.ref }}:${{ github.sha }}
            ${{ steps.meta.outputs.ref }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
