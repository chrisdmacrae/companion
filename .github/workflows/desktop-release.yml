name: Desktop Release

# Builds the Wails desktop app for macOS / Windows / Linux and attaches the artifacts
# to the GitHub Release for the tag. Kept separate from release.yml because the desktop
# app is a native GUI (CGO + platform webview) that must be built on each OS's own
# runner — unlike the server, which cross-compiles as pure Go on one Linux runner.
#
#   macOS   -> signed + notarized .dmg   (Developer ID; needs MACOS_* + NOTARY_* secrets)
#   Windows -> .zip of the .exe          (Authenticode-signed if WINDOWS_* secrets exist)
#   Linux   -> .tar.gz of the binary     (unsigned)
#
# Until the signing secrets exist the jobs still run and upload UNSIGNED artifacts, so
# nothing hard-fails before code signing is set up. See RELEASING.md.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build desktop binaries for, e.g. v0.0.0"
        required: true

permissions:
  contents: write # attach binaries to the release

env:
  GO_VERSION: "1.26.1"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  macos:
    name: desktop (macOS)
    runs-on: macos-14
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      # Secrets aren't available in `if:` directly; surface presence as a boolean env.
      SIGN: ${{ secrets.MACOS_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/desktop/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Import Developer ID certificate
        if: env.SIGN == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KPW="$(openssl rand -hex 16)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build notarized DMG
        if: env.SIGN == 'true'
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
        run: make desktop-dmg VERSION="$VERSION"

      - name: Build UNSIGNED app zip (no cert configured yet)
        if: env.SIGN != 'true'
        run: |
          make desktop-app
          mkdir -p build/dist
          ditto -c -k --keepParent build/Companion.app \
            "build/dist/Companion-$VERSION-macos-unsigned.zip"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: build/dist/*

  # ---------------------------------------------------------------------------
  windows:
    name: desktop (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash # so the steps below are one script across all three jobs
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
      SIGN: ${{ secrets.WINDOWS_CERT_PFX != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/desktop/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Build frontend + binary
        run: |
          npm run build -w @companion/desktop-frontend
          go build -C apps/desktop -trimpath -ldflags="-s -w -H windowsgui" \
            -o "$GITHUB_WORKSPACE/build/companion-desktop.exe" .

      - name: Sign (Authenticode)
        if: env.SIGN == 'true'
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          echo "$WINDOWS_CERT_PFX" | base64 --decode > cert.pfx
          signtool=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name signtool.exe -path "*x64*" | sort | tail -1)
          "$signtool" sign -f cert.pfx -p "$WINDOWS_CERT_PASSWORD" \
            -fd sha256 -tr http://timestamp.digicert.com -td sha256 \
            build/companion-desktop.exe
          rm -f cert.pfx

      - name: Archive
        run: |
          mkdir -p build/dist
          7z a -tzip "build/dist/Companion-$VERSION-windows-x64.zip" ./build/companion-desktop.exe

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: build/dist/*

  # ---------------------------------------------------------------------------
  linux:
    name: desktop (Linux)
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/desktop/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Wails GTK/WebKit build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - run: npm ci
      - name: Build + archive
        run: make desktop-archive VERSION="$VERSION"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: build/dist/*
