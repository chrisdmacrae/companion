# XcodeGen project definition for the native visionOS app. project.yml is the source of
# truth; Companion.xcodeproj is generated (gitignored) via `make visionos-project`
# (needs `brew install xcodegen`). Keeping the project generated avoids a hand-maintained,
# merge-hostile pbxproj in the repo.
name: Companion
options:
  bundleIdPrefix: com.companion
  deploymentTarget:
    visionOS: "2.0"
  createIntermediateGroups: true

targets:
  Companion:
    type: application
    platform: visionOS
    sources:
      - path: Sources
      # Bundled editor + graph web assets (generated by `make visionos-editor` / `-graph`).
      - path: Resources
      # App icon (layered visionOS .solidimagestack) + other image assets.
      - path: Assets.xcassets
    dependencies:
      # Built by `make visionos-artifacts` (core cross-compiled to xros device+sim).
      - framework: vendor/Core.xcframework
        embed: false   # static framework: linked into the app binary, not embedded
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.companion.visionos
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        # gomobile ships a static framework whose ObjC symbols the app links directly.
        OTHER_LDFLAGS: "$(inherited) -ObjC"
        # The visionOS core is built arm64-only (Apple Silicon); there is no Intel Vision
        # Pro simulator, so drop the x86_64 simulator slice xcodebuild would otherwise try.
        EXCLUDED_ARCHS[sdk=xrsimulator*]: x86_64
