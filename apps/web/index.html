<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover lets the app paint under the iPhone notch/home bar (the
         safe-area env() padding on #root keeps content clear of them);
         interactive-widget=resizes-content keeps the editor above the software keyboard
         on Android. maximum-scale=1 + user-scalable=no disable pinch/double-tap zoom on
         touch devices so the app feels native (and iOS stops auto-zooming focused
         inputs); desktop browsers ignore the viewport meta, so Cmd/Ctrl zoom still
         works there. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Companion</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f76808" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      /* dvh tracks the *visible* viewport on mobile (URL bar collapse, keyboard), so the
         app never sits half under browser chrome. Desktop is unaffected (dvh == vh). */
      @supports (height: 100dvh) {
        html, body { height: 100dvh; }
      }
      body { background: #f5f5f3; color: #1a1a18;
             font-family: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
             /* Stop pull-to-refresh / rubber-banding from fighting in-app scrollers. */
             overscroll-behavior-y: none; }
      #root { display: flex; box-sizing: border-box;
              /* Keep content clear of the notch / home bar (zero everywhere else). */
              padding: env(safe-area-inset-top) env(safe-area-inset-right)
                       env(safe-area-inset-bottom) env(safe-area-inset-left); }
      .boot { margin: auto; color: #7b7b75; font-size: 14px; }
    </style>
    <!-- Defines globalThis.Go; must load before the module that runs core.wasm. -->
    <script src="/wasm_exec.js"></script>
  </head>
  <body>
    <div id="root"><div class="boot">Starting Companion…</div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
