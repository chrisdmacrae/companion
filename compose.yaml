# Local development databases (PLAN §4.2 — the server's production store is Postgres).
# `docker compose up -d` / `make db-up`. Clients persist to local SQLite, not this DB.
name: companion

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-companion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-companion}
      POSTGRES_DB: ${POSTGRES_DB:-companion}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the separate companion_test database on first init (tests only).
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-companion} -d ${POSTGRES_DB:-companion}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage for document blobs (PLAN §6.9). The server streams
  # document bytes here via its BlobBackend; point it at MinIO with:
  #   BLOB_S3_ENDPOINT=http://localhost:9000 BLOB_S3_BUCKET=companion-blobs
  #   BLOB_S3_ACCESS_KEY=companion BLOB_S3_SECRET_KEY=companion123
  #   BLOB_S3_USE_PATH_STYLE=true BLOB_S3_REGION=us-east-1
  # The same env targets any S3-compatible provider (AWS S3, Cloudflare R2, Backblaze B2).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${BLOB_S3_ACCESS_KEY:-companion}
      MINIO_ROOT_PASSWORD: ${BLOB_S3_SECRET_KEY:-companion123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Creates the blob bucket on startup so the server has somewhere to write (dev only).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${BLOB_S3_ACCESS_KEY:-companion} ${BLOB_S3_SECRET_KEY:-companion123} &&
      mc mb --ignore-existing local/${BLOB_S3_BUCKET:-companion-blobs}
      "

volumes:
  pgdata:
  miniodata:
